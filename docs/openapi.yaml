openapi: 3.1.0
info:
  title: CRM Ultimate API
  version: 1.0.0
  description: API-first B2B CRM covering companies, contacts, deals, pipelines, activities, custom fields, saved views, CSV import/export, JWT auth and role-based access.
servers:
  - url: http://localhost:8080/api/v1
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Company:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        domain: { type: string, nullable: true }
        custom_values: { type: object }
    Contact:
      type: object
      properties:
        id: { type: integer }
        first_name: { type: string }
        last_name: { type: string, nullable: true }
        email: { type: string, nullable: true }
        company_id: { type: integer, nullable: true }
    Deal:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        amount: { type: number }
        currency: { type: string }
        status: { type: string, enum: [open, won, lost] }
        pipeline_id: { type: integer }
        pipeline_stage_id: { type: integer }
paths:
  /auth/login:
    post:
      security: []
      summary: Authenticate a user and return a JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: JWT token response.
  /auth/me:
    get:
      summary: Return the authenticated user.
      responses:
        "200": { description: Current user. }
  /companies:
    get:
      summary: List companies with search, filter, sort and pagination.
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: sort, in: query, schema: { type: string, example: "-created_at" } }
        - { name: per_page, in: query, schema: { type: integer, default: 25 } }
      responses:
        "200": { description: Paginated companies. }
    post:
      summary: Create a company.
      responses:
        "201": { description: Company created. }
  /contacts:
    get:
      summary: List contacts.
      responses:
        "200": { description: Paginated contacts. }
    post:
      summary: Create a contact.
      responses:
        "201": { description: Contact created. }
  /deals:
    get:
      summary: List deals.
      responses:
        "200": { description: Paginated deals. }
    post:
      summary: Create a deal.
      responses:
        "201": { description: Deal created. }
  /deals/{id}/move:
    post:
      summary: Move a deal to another pipeline stage and update won/lost/open status.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deal moved. }
  /pipelines:
    get:
      summary: List pipelines. Admin and manager only.
      responses:
        "200": { description: Paginated pipelines. }
    post:
      summary: Create a pipeline. Admin and manager only.
      responses:
        "201": { description: Pipeline created. }
  /pipeline-stages:
    get:
      summary: List pipeline stages. Admin and manager only.
      responses:
        "200": { description: Paginated stages. }
  /activities:
    get:
      summary: List CRM activities.
      responses:
        "200": { description: Paginated activities. }
    post:
      summary: Create note, task, call or email activity.
      responses:
        "201": { description: Activity created. }
  /tasks:
    get:
      summary: List task activities only.
      responses:
        "200": { description: Paginated tasks. }
  /custom-fields:
    get:
      summary: List custom field definitions. Admin and manager only.
      responses:
        "200": { description: Paginated fields. }
  /saved-views:
    get:
      summary: List saved views.
      responses:
        "200": { description: Paginated saved views. }
  /imports:
    post:
      summary: Upload a CSV import job for companies, contacts or deals. Admin and manager only.
      responses:
        "202": { description: Import queued. }
  /exports:
    post:
      summary: Queue a CSV export for companies, contacts or deals. Admin and manager only.
      responses:
        "202": { description: Export queued. }
