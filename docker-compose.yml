services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan serve --host=0.0.0.0 --port=8080
    env_file:
      - path: .env
        required: false
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - redis

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=600 --memory=512
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crm_ultimate
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_FORWARD:-6380}:6379"

volumes:
  postgres-data:
