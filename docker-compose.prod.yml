services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: crm-app
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - web
      - internal
    depends_on:
      - postgres
      - redis
    healthcheck:
      # /up = endpoint santé Laravel (200 si l'app boot correctement)
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: crm-queue
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=600 --memory=512
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - internal
    depends_on:
      - postgres
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  postgres:
    image: postgres:17-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    # maxmemory + volatile-lru : n'évince QUE les clés à TTL (cache) sous pression,
    # protège les jobs de queue (sans TTL). appendonly : persistance AOF (survit au reboot).
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "volatile-lru", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  web:
    external: true
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  app-storage:
